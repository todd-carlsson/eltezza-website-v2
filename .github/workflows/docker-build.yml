name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Login to GitHub Docker Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login https://ghcr.io -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/todd-carlsson/eltezza-website:latest .

      - name: Push Docker image
        run: docker push ghcr.io/todd-carlsson/eltezza-website:latest

      - name: Trigger deployment webhook
        run: |
          curl --fail --show-error --silent \
               --connect-timeout 10 \
               --max-time 30 \
               --retry 5 \
               --retry-delay 5 \
               -X POST ${{ secrets.DEPLOYMENT_WEBHOOK_URL }}


      - name: Notify ntfy on failure
        if: failure()
        continue-on-error: true
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_ERROR_TOPIC: ${{ secrets.NTFY_ERROR_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          curl --fail --silent --show-error \
               --connect-timeout 10 \
               --max-time 30 \
               --retry 5 \
               --retry-delay 5 \
               -H "Authorization: Bearer $NTFY_TOKEN" \
               -H "Title: 🚨 GitHub Action Failed" \
               -H "Priority: urgent" \
               -H "Tags: github,error" \
               -d "Repo: ${{ github.repository }}
                  Branch: ${{ github.ref_name }}
                  Actor: ${{ github.actor }}
                  Commit: ${{ github.sha }}
                  Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                 ${{ secrets.NTFY_URL }}${{ secrets.NTFY_ERROR_TOPIC }}

